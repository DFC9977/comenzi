name: Tests (smoke)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # IMPORTANT: dacă Playwright e folosit, trebuie browserul.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: |
          set -e
          echo "== Node/npm =="
          node -v
          npm -v

          echo "== Repo root =="
          ls -la

          echo "== Find tests (spec/test files) =="
          find . -maxdepth 5 -type f \( -name "*.spec.js" -o -name "*.test.js" -o -name "*.spec.ts" -o -name "*.test.ts" \) | sed -n '1,200p'

          echo "== Playwright version =="
          npx playwright --version

          # Rulează fișierul tău dacă există, altfel rulează folderul, altfel auto-discover
          if [ -f "tests/e2e/order-workflow.spec.js" ]; then
            echo "Running: tests/e2e/order-workflow.spec.js"
            CI=true SMOKE_TEST=true npx playwright test tests/e2e/order-workflow.spec.js --project=chromium --workers=2
          elif [ -d "tests/e2e" ]; then
            echo "Running: tests/e2e (folder)"
            CI=true SMOKE_TEST=true npx playwright test tests/e2e --project=chromium --workers=2
          else
            echo "Running: playwright auto-discovery"
            CI=true SMOKE_TEST=true npx playwright test --project=chromium --workers=2
          fi
