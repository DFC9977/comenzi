name: Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests if they exist
        run: |
          if find . -type f -name "*.spec.*" | grep -q .; then
            echo "Playwright tests found"
            npx playwright test
          else
            echo "No Playwright tests found — skipping"
          fi
